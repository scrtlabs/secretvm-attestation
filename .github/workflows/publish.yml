name: Publish to npm and PyPI

on:
  release:
    types: [published]

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: node
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - run: npm ci

      - name: Sync artifact registry data
        run: |
          cp ../artifacts_registry/tdx.csv data/tdx.csv
          cp ../artifacts_registry/sev.json data/sev.json

      - name: Set version from tag
        run: npm version "${{ github.event.release.tag_name }}" --no-git-tag-version --allow-same-version

      - run: npm run build

      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-pypi:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install build twine

      - name: Sync artifact registry data
        run: |
          cp ../artifacts_registry/tdx.csv src/secretvm/verify/data/tdx.csv
          cp ../artifacts_registry/sev.json src/secretvm/verify/data/sev.json

      - name: Set version from tag
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          sed -i "s/^version = .*/version = \"${VERSION}\"/" pyproject.toml

      - run: python -m build

      - run: python -m twine upload dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
